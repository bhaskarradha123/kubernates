apiVersion: apps/v1
kind: ReplicaSet

metadata: 
   name: nginx-rs

spec:
  replicas: 3
  
  selector:
    matchLabels:
       app: nginx

  template:
    metadata: 
     labels:
       app: nginx
    
    spec:
      containers:
        - name: nginx
          image: nginx 


